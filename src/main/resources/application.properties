# ===============================
# ? VOXORA AI - SERVER CONFIG
# ===============================
server.port=8080
spring.application.name=voxora-ai-core
server.forward-headers-strategy=native

# ===============================
# ?? MYSQL DATABASE CONNECTION
# ===============================
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===============================
# ?? HIBERNATE & JPA SETTINGS
# ===============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ===============================
# ? REDIS CACHE (Temporary Memory)
# ===============================
# Ensure you have Redis running locally on your machine
spring.data.redis.host=${REDIS_HOST}
spring.data.redis.port=${REDIS_PORT}
spring.data.redis.password=${REDIS_PASSWORD}
spring.data.redis.ssl.enabled=true

# ===============================
# ? EXTERNAL API KEYS (Replace with your actual keys)
# ===============================
# Deepgram (For ultra-fast listening)
voxora.api.deepgram.key=${DEEPGRAM_API_KEY}

# Google Gemini (The Brain)
voxora.api.gemini.key=${GEMINI_API_KEY}

# ElevenLabs (The Voice)
voxora.api.elevenlabs.key=${ELEVENLABS_API_KEY}
voxora.api.elevenlabs.voiceId=${ELEVENLABS_VOICE_ID}

# ===============================
# ? FINTECH LAYER (Mocked for MVP)
# ===============================
voxora.api.razorpay.keyId=${RAZORPAY_KEY_ID}
voxora.api.razorpay.keySecret=${RAZORPAY_KEY_SECRET}
